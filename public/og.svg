<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="g1" cx="15%" cy="0%" r="55%">
      <stop offset="0%" stop-color="#c25543" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#c25543" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="95%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#3aa89a" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#3aa89a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#f5f4f0"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <text x="72" y="100" font-family="Helvetica,Arial,sans-serif" font-size="22" letter-spacing="5" fill="#6b6760">THE JOY MATRIX</text>

  <text x="72" y="300" font-family="Georgia,serif" font-style="italic" font-weight="900" font-size="148" fill="#1a1a18">
    From <tspan fill="#c25543" font-style="normal" font-weight="400">A</tspan> to <tspan fill="#3aa89a" font-style="normal" font-weight="400">B</tspan>,
  </text>
  <text x="72" y="378" font-family="Georgia,serif" font-style="italic" font-size="54" fill="#6b6760">without burning anyone out.</text>

  <text x="72" y="490" font-family="Helvetica,Arial,sans-serif" font-size="26" fill="#1a1a18">Score tasks by pleasure, talent, and capacity.</text>
  <text x="72" y="526" font-family="Helvetica,Arial,sans-serif" font-size="26" fill="#6b6760">Route work by fit. Eliminate burnout. Compound joy.</text>

  <text x="72" y="590" font-family="Helvetica,Arial,sans-serif" font-size="18" letter-spacing="2" fill="#6b6760">JOY-MATRIX.COM</text>
</svg>
